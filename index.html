
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tracy Akinyi | Cybersecurity & Networking</title>
  
  <link rel="stylesheet" href="styles.css"/>
  <style>
    
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 8rem 3rem 4rem;
      position: relative;
      overflow: hidden;
    }

    #hero::after {
      content: '';
      position: absolute;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-tag {
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s forwards;
    }

    .hero-name {
      font-family: var(--sans);
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 800;
      line-height: 1;
      color: #fff;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s forwards;
    }

    .hero-name span { color: var(--accent); }

    .hero-title {
      font-size: 1rem;
      color: var(--accent2);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.6s forwards;
    }

    .hero-bio {
      max-width: 520px;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.8s forwards;
    }

    .hero-cta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.6s 1s forwards;
    }

    @media (max-width: 768px) {
      #hero { padding: 7rem 1.5rem 3rem; }
    }
  </style>
</head>
<body>

  
  <section id="hero">
    <div>
      <p class="hero-tag">Cybersecurity & Networking</p>

      
      <h2 class="hero-name">My<br/><span>Portfolio</span></h2>

    
      <p class="hero-title">> Aspiring Network & Security Engineer</p>

   
      <p class="hero-bio">
        A passionate IT student focused on building secure, resilient infrastructure.
        I love exploring how systems communicate — and how to protect them.
      </p>

      <div class="hero-cta">
        <a href="projects.html" class="btn">View My Work</a>
        <a href="contact.html" class="btn btn-ghost">Get In Touch</a>
      </div>
    </div>
  </section>

  
  <script src="nav.js"></script>
</body>
</html>
